<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üçbucaq Restoran — Menyu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #C9A84C;
    --accent2: #F5A623;
    --bg: #1A1210;
    --card: #2A1F14;
    --text: #F5E6C8;
    --muted: #A08050;
    --border: rgba(201,168,76,0.22);
    --header-text: #ffffff;
    --radius: 18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    overflow: hidden;
    background: #0E0A06;
    padding: 1rem 1rem 1rem;
    text-align: center;
    border-radius: 0 0 2.5rem 2.5rem;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -30px;
    width: 120px; height: 120px;
    background: var(--accent2);
    opacity: 0.35;
    border-radius: 50%;
  }

  /* Dil düyməsi — yuxarı sağ */
  .lang-toggle {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    display: flex;
    gap: 3px;
    z-index: 10;
  }
  .lang-btn {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 0.68rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: #fff;
    color: var(--accent);
    border-color: #fff;
  }
  .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.3); }

  /* Logo sahəsi */
  .header-logo-wrap {
    width: 120px;
    height: 120px;
    border-radius: 22px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.5rem;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .header-logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }
  .header-logo-placeholder {
    color: rgba(255,255,255,0.7);
    text-align: center;
  }
  .header-logo-placeholder span { font-size: 0.9rem; display: block; }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #C9A84C;
    letter-spacing: 0.5px;
    position: relative; z-index: 1;
  }
  .header p {
    font-size: 0.75rem;
    color: var(--header-text, rgba(255,255,255,0.80));
    opacity: 0.8;
    margin-top: 2px;
    position: relative; z-index: 1;
  }

  /* ── CATEGORY BAR ── */
  .cats-wrap {
    padding: 1.25rem 1rem 0.5rem;
    overflow-x: auto;
    overflow-y: visible;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
    cursor: grab;
  }
  .cats-wrap:active { cursor: grabbing; }
  .cats-wrap::-webkit-scrollbar { display: none; }
  .cats {
    display: flex;
    gap: 8px;
    width: max-content;
    min-width: 100%;
  }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 0.5rem 1rem 0;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 0.6rem 1rem 0.6rem 2.4rem;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--card);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,98,42,0.1);
  }
  .search-input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 1.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.95rem;
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 1.6rem;
    top: 50%;
    transform: translateY(-50%);
    background: var(--muted);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 0.65rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .search-clear.visible { display: flex; }
  .search-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
    display: none;
  }
  .search-empty span { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
  .cat-btn {
    white-space: nowrap;
    border: 1.5px solid rgba(201,168,76,0.5);
    background: transparent;
    color: #C9A84C;
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .cat-btn.active {
    background: #1A1210;
    color: #fff;
  }
  .cat-btn:hover:not(.active) {
    background: rgba(232,98,42,0.07);
  }

  /* ── SECTIONS ── */
  .sections { padding: 0.5rem 1rem 1rem; }
  .section-title {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin: 1.2rem 0 0.6rem;
  }

  /* ── ITEM CARD ── */
  .item-card {
    display: flex;
    align-items: center;
    gap: 13px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
    margin-bottom: 10px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .item-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,98,42,0.10);
  }

  /* GRID layout */
  [data-layout="grid"] #menu-sections > div {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  [data-layout="grid"] #menu-sections > div > .section-title { grid-column: 1/-1; }
  [data-layout="grid"] .item-card {
    flex-direction: column;
    align-items: flex-start;
    padding: 12px;
    margin-bottom: 0;
    gap: 8px;
  }
  [data-layout="grid"] .item-icon, [data-layout="grid"] .item-card img {
    width: 100% !important;
    height: 100px !important;
    border-radius: 10px;
    object-fit: cover;
  }
  [data-layout="grid"] .item-info { width: 100%; }
  [data-layout="grid"] .item-price { margin-top: 4px; font-size: 1rem; }

  /* CARD layout */
  [data-layout="card"] .item-card {
    flex-direction: column;
    align-items: flex-start;
    padding: 0;
    gap: 0;
    overflow: hidden;
  }
  [data-layout="card"] .item-icon, [data-layout="card"] .item-card > img {
    width: 100% !important;
    height: 160px !important;
    border-radius: 0;
    object-fit: cover;
  }
  [data-layout="card"] .item-info { padding: 12px 14px 4px; width: 100%; }
  [data-layout="card"] .item-price { padding: 0 14px 14px; font-size: 1.1rem; }
  .item-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 0.93rem;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .item-desc {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 8px;
    letter-spacing: 0.2px;
  }
  .badge-new { background: #eaf3de; color: #3B6D11; }
  .badge-hot { background: #FAECE7; color: #993C1D; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 1rem 1rem 2rem;
    border-top: 1px solid var(--border);
    margin: 0.5rem 1rem 0;
    border-radius: 0;
  }
  .footer strong { color: var(--accent); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .item-card { animation: fadeUp 0.25s ease both; cursor: pointer; }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,12,8,0.55);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(60px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-box {
    background: var(--card);
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 0 0 2.5rem;
    animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1) both;
    position: relative;
    overflow: hidden;
  }
  .modal-drag {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px auto 0;
  }
  .modal-icon-wrap {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    margin: 1rem 0 0;
    border-radius: 20px;
    margin: 1rem 1.5rem 0;
    width: calc(100% - 3rem);
  }
  .modal-body { padding: 1.25rem 1.5rem 0; }
  .modal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 0.75rem;
  }
  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .modal-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .modal-desc {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1.2rem;
  }
  .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .modal-tag {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    background: #FFF3E0;
    color: #993C1D;
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    line-height: 1;
  }
  .modal-close:hover { background: #f0e8e0; }

  /* ── RESPONSIVE ── */
  @media (min-width: 540px) {
    body { display: flex; justify-content: center; }
    body > .menu-wrap { max-width: 480px; width: 100%; }
  }
</style>
</head>
<body>
<div class="menu-wrap">

  <div class="header">
    <!-- Dil düyməsi — yuxarı sağ -->
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('az')">AZ</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <!-- Loqo sahəsi -->
    <div class="header-logo-wrap" id="logo-wrap">
      <div class="header-logo-placeholder" id="logo-placeholder"><span>🏪</span></div>
    </div>

    <h1>Üçbucaq Restoran</h1>
    <p id="cafe-sub">Bakı, Nizami küçəsi 42</p>
    <div id="social-bar" style="display:flex;gap:8px;justify-content:center;margin-top:6px;flex-wrap:wrap;position:relative;z-index:1"></div>
  </div>

  <div class="cats-wrap"><div class="cats" id="cat-bar"></div></div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="menu-search" type="text" placeholder="Axtar..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-empty" id="search-empty">
    <span>🍽️</span>Heç nə tapılmadı
  </div>

  <div class="sections" id="menu-sections"></div>
  <div class="footer" id="footer-note">Zəng etmək üçün: <strong>+994 50 000 00 00</strong></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-drag"></div>
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-icon-wrap" id="modal-icon-wrap"></div>
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-price" id="modal-price"></div>
      </div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<script>
// ── localStorage-dan data oxu (admin.html ilə sinxron) ──
// ── FLASK API ──

// ── EMBEDDED DATA (JSONBin əlçatmaz olduqda fallback) ──
const EMBEDDED_DATA = {"cafe":{"nameAz":"Üçbucaq Restoran","nameEn":"Üçbucaq Restoran","addrAz":"Bakı, Nizami küçəsi 42","addrEn":"42 Nizami Street, Baku","phone":"+994 50 000 00 00","icon":"☕"},"categories":[{"id":"coffee","labelAz":"Qəhvə","labelEn":"Coffee","bg":"#FFF3E0"},{"id":"tea","labelAz":"Çay","labelEn":"Tea","bg":"#E8F5E9"},{"id":"food","labelAz":"Yemək","labelEn":"Food","bg":"#FFF8E1"},{"id":"dessert","labelAz":"Desert","labelEn":"Desserts","bg":"#FCE4EC"}],"items":[{"catId":"coffee","nameAz":"Espresso","nameEn":"Espresso","descAz":"Klassik italyan espressosu","descEn":"Classic Italian espresso","detailsAz":"Tam qovrulmuş ərəb qəhvə dənlərindən hazırlanmış sıx espresso.","detailsEn":"Rich espresso from roasted arabica beans.","price":"3.00","badge":"null","icon":"☕","image":null,"tags":"30ml, Şəkərsiz, Vegan"},{"catId":"coffee","nameAz":"Kapuçino","nameEn":"Cappuccino","descAz":"Espresso + süd köpüyü","descEn":"Espresso + milk foam","detailsAz":"İki qat espresso üzərinə süd köpüyü.","detailsEn":"Double espresso with milk foam.","price":"4.50","badge":"hot","icon":"🥛","image":null,"tags":"180ml, Süd ilə, İsti"},{"catId":"coffee","nameAz":"Soyuq Latte","nameEn":"Iced Latte","descAz":"Buzlu süd + espresso","descEn":"Iced milk + espresso","detailsAz":"Espresso üzərinə soyuq süd, buz ilə servis edilir.","detailsEn":"Espresso over cold milk and ice.","price":"5.50","badge":"new","icon":"🧋","image":null,"tags":"350ml, Buzlu, Yeni"},{"catId":"coffee","nameAz":"Türk Qəhvəsi","nameEn":"Turkish Coffee","descAz":"Ənənəvi üsulda","descEn":"Traditionally brewed","detailsAz":"Cəzvedə hazırlanan ənənəvi türk qəhvəsi.","detailsEn":"Traditional cezve-brewed coffee.","price":"3.50","badge":"null","icon":"☕","image":null,"tags":"60ml, Ənənəvi"},{"catId":"tea","nameAz":"Azərbaycan Çayı","nameEn":"Azerbaijani Tea","descAz":"Dəmli qırmızı çay","descEn":"Strong red tea","detailsAz":"Ənənəvi armudu stəkanda servis edilir.","detailsEn":"Served in a tulip glass.","price":"2.50","badge":"null","icon":"🍵","image":null,"tags":"200ml, Dəmli"},{"catId":"tea","nameAz":"Limonlu Çay","nameEn":"Lemon Tea","descAz":"Zəncəfil və bal ilə","descEn":"With ginger and honey","detailsAz":"Zəncəfil, bal və limon ilə dəmlənmiş çay.","detailsEn":"Brewed with ginger, honey and lemon.","price":"3.50","badge":"new","icon":"🍋","image":null,"tags":"250ml, Ballı"},{"catId":"food","nameAz":"Kruasan","nameEn":"Croissant","descAz":"Yağlı fransız kruasanı","descEn":"Buttery French croissant","detailsAz":"Hər gün təzə bişirilən qatlı kruasan.","detailsEn":"Freshly baked every day.","price":"4.00","badge":"null","icon":"🥐","image":null,"tags":"Təzə bişmiş, Vegetarian"},{"catId":"food","nameAz":"Vafli","nameEn":"Waffle","descAz":"Bal və qaymaq ilə","descEn":"With honey and cream","detailsAz":"Belçika üslubunda hazırlanmış isti vafli.","detailsEn":"Belgian-style waffle.","price":"7.00","badge":"hot","icon":"🧇","image":null,"tags":"İsti, Ballı"},{"catId":"dessert","nameAz":"Çizkeyk","nameEn":"Cheesecake","descAz":"New-York stili","descEn":"New York style","detailsAz":"Sıx, kremli, qərəfilli biskvit bazası üzərində.","detailsEn":"Dense and creamy NY cheesecake.","price":"6.50","badge":"hot","icon":"🍰","image":null,"tags":"New-York, Bestseller"},{"catId":"dessert","nameAz":"Tiramisu","nameEn":"Tiramisu","descAz":"Klassik italyan deserti","descEn":"Classic Italian dessert","detailsAz":"Maskarpone krem, espressoya batırılmış savoiardi.","detailsEn":"Mascarpone cream with espresso savoiardi.","price":"7.50","badge":"new","icon":"🍮","image":null,"tags":"Kafein var, Maskarpone"}]};

function loadState() {
  try {
    const saved = localStorage.getItem('cafe_data');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.items) {
        data.items = data.items.map(item => ({
          ...item,
          price: String(item.price || '').replace(/₼/g,'').replace(/#8380;?/g,'').replace(/AZN/gi,'').replace(/[^\d.,]/g,'').trim()
        }));
      }
      return data;
    }
  } catch(e) {}
  return EMBEDDED_DATA;
}

let lang = 'az', activeCat = 'all', searchQuery = '';
let STATE = loadState();

// Tema tətbiq et
function applyThemeVars() {
  try {
    const vars = localStorage.getItem('cafe_theme_vars');
    if (vars) {
      const v = JSON.parse(vars);
      const root = document.documentElement.style;
      if (v.accent)      root.setProperty('--accent', v.accent);
      if (v.accent2)     root.setProperty('--accent2', v.accent2 || v.accent);
      if (v.bg)          root.setProperty('--bg', v.bg);
      if (v.card)        root.setProperty('--card', v.card);
      if (v.text)        root.setProperty('--text', v.text);
      if (v.muted)       root.setProperty('--muted', v.muted);
      if (v.border)      root.setProperty('--border', v.border);
      if (v.headerText)  root.setProperty('--header-text', v.headerText);
    }
  } catch(e) {}
}

function applyFontVars() {
  try {
    const vars = localStorage.getItem('cafe_font_vars');
    if (!vars) return;
    const v = JSON.parse(vars);
    if (v.body)    document.documentElement.style.setProperty('--font-body', v.body);
    if (v.heading) document.documentElement.style.setProperty('--font-heading', v.heading);
    // Dynamically load Google Font if needed
    const fontName = v.body.split(',')[0].replace(/'/g,'').trim();
    const known = ['DM Sans','Playfair Display'];
    if (!known.includes(fontName)) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=' + fontName.replace(/ /g,'+') + ':wght@400;500;600;700&display=swap';
      document.head.appendChild(link);
    }
    document.body.style.fontFamily = v.body;
    document.querySelectorAll('h1,h2,.section-title').forEach(el => { el.style.fontFamily = v.heading; });
  } catch(e) {}
}

function applyLayoutVars() {
  try {
    const layout = localStorage.getItem('cafe_layout') || 'list';
    document.body.setAttribute('data-layout', layout);
  } catch(e) {}
}

function applyCustomCss() {
  try {
    const css = localStorage.getItem('cafe_custom_css');
    if (!css) return;
    let styleEl = document.getElementById('custom-css-tag');
    if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'custom-css-tag'; document.head.appendChild(styleEl); }
    styleEl.textContent = css;
  } catch(e) {}
}

applyThemeVars();
applyFontVars();
applyLayoutVars();
applyCustomCss();

// localStorage dəyişərsə (admin paneldən) avtomatik yenilə
window.addEventListener('storage', e => {
  if (e.key === 'cafe_data')        { STATE = loadState(); render(); }
  if (e.key === 'cafe_theme_vars')  { applyThemeVars(); }
  if (e.key === 'cafe_font_vars')   { applyFontVars(); }
  if (e.key === 'cafe_layout')      { applyLayoutVars(); render(); }
  if (e.key === 'cafe_custom_css')  { applyCustomCss(); }
  if (e.key === 'cafe_logo')        { loadLogo(); }
});

function cleanPrice(p) {
  return String(p || '').replace(/₼/g,'').replace(/#8380;?/g,'').replace(/AZN/gi,'').replace(/[^\d.,]/g,'').trim();
}
function getCats() {
  if (!STATE) return [];
  return STATE.categories || [];
}
function getItems(catId) {
  if (!STATE) return [];
  const items = (STATE.items || [])
    .filter(i => !i.inactive)
    .map(i => ({...i, price: cleanPrice(i.price)}));
  return catId === 'all' ? items : items.filter(i => i.catId === catId);
}
function getCafe() {
  if (!STATE) return { nameAz:'Üçbucaq Restoran', nameEn:'Üçbucaq Restoran', addrAz:'', addrEn:'', phone:'', icon:'☕' };
  return STATE.cafe || {};
}

function trackClick(item) {
  var key = item.nameAz || item.nameEn || 'unknown';
  fetch('/api/stats', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type:'click', item: key})}).catch(()=>{});
}

function trackMenuOpen() {
  fetch('/api/stats', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type:'open'})}).catch(()=>{});
}

function trackCatClick(catId) {
  fetch('/api/stats', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type:'cat', cat: catId})}).catch(()=>{});
}

function openModal(item) {
  trackClick(item);
  const cat = getCats().find(c => c.id === item.catId) || {};
  const bg = cat.bg || '#FFF3E0';
  const overlay = document.getElementById('modal-overlay');
  const iconWrap = document.getElementById('modal-icon-wrap');
  iconWrap.style.background = bg;
  const _img = item.image || item.img || '';
  if (_img) {
    iconWrap.innerHTML = `<img src="${_img}" style="width:100%;height:100%;object-fit:cover;border-radius:16px">`;
  } else {
    iconWrap.textContent = (item.icon && item.icon !== 'undefined') ? item.icon : '🍽️';
  }
  document.getElementById('modal-name').textContent = lang === 'az' ? item.nameAz : (item.nameEn || item.nameAz);
  document.getElementById('modal-price').textContent = item.price + ' ₼';
  document.getElementById('modal-desc').textContent =
    lang === 'az' ? (item.detailsAz || item.descAz) : (item.detailsEn || item.descEn || item.detailsAz);
  const tagsEl = document.getElementById('modal-tags');
  tagsEl.innerHTML = '';
  if (item.badge && item.badge !== 'null') {
    const label = item.badge === 'new'
      ? (lang === 'az' ? 'Yeni məhsul' : 'New item')
      : (lang === 'az' ? 'Məşhur seçim' : 'Popular choice');
    const span = document.createElement('span');
    span.className = 'modal-tag';
    span.style.background = item.badge === 'new' ? '#eaf3de' : '#FAECE7';
    span.style.color = item.badge === 'new' ? '#3B6D11' : '#993C1D';
    span.textContent = label;
    tagsEl.appendChild(span);
  }
  if (item.tags) {
    item.tags.split(',').forEach(t => {
      const s = t.trim();
      if (!s) return;
      const span = document.createElement('span');
      span.className = 'modal-tag';
      span.textContent = s;
      tagsEl.appendChild(span);
    });
  }
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const inp = document.getElementById('menu-search');
  if (inp) inp.placeholder = l === 'az' ? 'Axtar...' : 'Search...';
  const emptyEl = document.getElementById('search-empty');
  if (emptyEl) emptyEl.innerHTML = '<span>🍽️</span>' + (l === 'az' ? 'Heç nə tapılmadı' : 'Nothing found');
  if (searchQuery) renderSearch(); else render();
}

function render() {
  const cafe = getCafe();
  const cats = getCats();

  // Header
  const cafeName = lang === 'az' ? cafe.nameAz : (cafe.nameEn || cafe.nameAz);
  document.querySelector('.header h1').textContent = cafeName;
  document.title = cafeName + ' — Menu';
  document.getElementById('cafe-sub').textContent =
    lang === 'az' ? cafe.addrAz : (cafe.addrEn || cafe.addrAz);

  // Loqo
  loadLogo();
  document.getElementById('footer-note').innerHTML =
    lang === 'az'
      ? `Zəng etmək üçün: <strong>${cafe.phone}</strong>`
      : `Call us: <strong>${cafe.phone}</strong>`;

  // Social bar
  const socialBar = document.getElementById('social-bar');
  socialBar.innerHTML = '';
  const iconBtn = 'display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;text-decoration:none;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.3);color:#fff;background:rgba(255,255,255,0.15);transition:background 0.2s';
  const igSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`;
  const ttSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.27 8.27 0 0 0 4.84 1.56V6.81a4.85 4.85 0 0 1-1.07-.12z"/></svg>`;
  const mapSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

  if (cafe.instagram) {
    socialBar.innerHTML += `<a href="https://instagram.com/${cafe.instagram}" target="_blank" style="${iconBtn}" title="Instagram">${igSVG}</a>`;
  }
  if (cafe.tiktok) {
    socialBar.innerHTML += `<a href="https://tiktok.com/@${cafe.tiktok}" target="_blank" style="${iconBtn}" title="TikTok">${ttSVG}</a>`;
  }
  if (cafe.maps) {
    socialBar.innerHTML += `<a href="${cafe.maps}" target="_blank" style="${iconBtn}" title="${lang==='az'?'Xəritə':'Map'}">${mapSVG}</a>`;
  }

  // Category bar
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = '';
  const allLabel = lang === 'az' ? 'Hamısı' : 'All';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (activeCat === 'all' ? ' active' : '');
  allBtn.textContent = allLabel;
  allBtn.onclick = () => { activeCat = 'all'; clearSearch(); };
  bar.appendChild(allBtn);

  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat === cat.id ? ' active' : '');
    btn.textContent = lang === 'az' ? cat.labelAz : (cat.labelEn || cat.labelAz);
    btn.onclick = () => { activeCat = cat.id; trackCatClick(cat.id); clearSearch(); };
    bar.appendChild(btn);
  });

  // Menu sections
  const sec = document.getElementById('menu-sections');
  sec.innerHTML = '';
  const visibleCats = cats.filter(c => activeCat === 'all' || activeCat === c.id);

  visibleCats.forEach(cat => {
    const items = getItems(cat.id);
    if (!items.length) return;
    const wrap = document.createElement('div');
    const catLabel = lang === 'az' ? cat.labelAz : (cat.labelEn || cat.labelAz);
    wrap.innerHTML = `<div class="section-title">${catLabel}</div>`;
    items.forEach((item, i) => {
      const badgeVal = item.badge && item.badge !== 'null' ? item.badge : null;
      const badge = badgeVal === 'new'
        ? `<span class="badge badge-new">${lang==='az'?'Yeni':'New'}</span>`
        : badgeVal === 'hot'
        ? `<span class="badge badge-hot">${lang==='az'?'Məşhur':'Popular'}</span>`
        : '';
      const name = lang === 'az' ? item.nameAz : (item.nameEn || item.nameAz);
      const desc = lang === 'az' ? item.descAz : (item.descEn || item.descAz);
      const _itemImg1 = item.image || item.img || '';
      const iconHtml = _itemImg1
        ? `<img src="${_itemImg1}" style="width:50px;height:50px;border-radius:12px;object-fit:cover;flex-shrink:0">`
        : `<div class="item-icon" style="background:${cat.bg}">${(item.icon && item.icon !== 'undefined') ? item.icon : '🍽️'}</div>`;
      const card = document.createElement('div');
      card.className = 'item-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.onclick = () => openModal(item);
      card.innerHTML = `
        ${iconHtml}
        <div class="item-info">
          <div class="item-name">${name} ${badge}</div>
          <div class="item-desc">${desc}</div>
        </div>
        <div class="item-price">${item.price} ₼</div>`;
      wrap.appendChild(card);
    });
    sec.appendChild(wrap);
  });

  if (!STATE) {
    sec.innerHTML = '<p style="text-align:center;color:var(--muted);padding:2rem">Menyu məlumatı tapılmadı</p>';
  }
}

// ── SEARCH ──
function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.classList.toggle('visible', searchQuery.length > 0);
  renderSearch();
}

function clearSearch() {
  searchQuery = '';
  const inp = document.getElementById('menu-search');
  if (inp) inp.value = '';
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.classList.remove('visible');
  renderSearch();
}

function renderSearch() {
  const sec = document.getElementById('menu-sections');
  const emptyEl = document.getElementById('search-empty');
  if (!searchQuery) {
    // Show normal render
    if (emptyEl) emptyEl.style.display = 'none';
    render();
    return;
  }

  const cats = getCats();
  const allItems = getItems('all');
  const matched = allItems.filter(item => {
    const name = ((item.nameAz || '') + ' ' + (item.nameEn || '')).toLowerCase();
    const desc = ((item.descAz || '') + ' ' + (item.descEn || '')).toLowerCase();
    const tags = (item.tags || '').toLowerCase();
    return name.includes(searchQuery) || desc.includes(searchQuery) || tags.includes(searchQuery);
  });

  sec.innerHTML = '';
  if (!matched.length) {
    if (emptyEl) emptyEl.style.display = 'block';
    return;
  }
  if (emptyEl) emptyEl.style.display = 'none';

  // Group by category
  cats.forEach(cat => {
    const catItems = matched.filter(i => i.catId === cat.id);
    if (!catItems.length) return;
    const wrap = document.createElement('div');
    const catLabel = lang === 'az' ? cat.labelAz : (cat.labelEn || cat.labelAz);
    wrap.innerHTML = `<div class="section-title">${catLabel}</div>`;
    catItems.forEach((item, i) => {
      const badgeVal = item.badge && item.badge !== 'null' ? item.badge : null;
      const badge = badgeVal === 'new'
        ? `<span class="badge badge-new">${lang==='az'?'Yeni':'New'}</span>`
        : badgeVal === 'hot'
        ? `<span class="badge badge-hot">${lang==='az'?'Məşhur':'Popular'}</span>`
        : '';
      const name = lang === 'az' ? item.nameAz : (item.nameEn || item.nameAz);
      const desc = lang === 'az' ? item.descAz : (item.descEn || item.descAz);

      // Highlight matched text
      const hlName = highlight(name, searchQuery);
      const hlDesc = highlight(desc, searchQuery);

      const _itemImg2 = item.image || item.img || '';
      const iconHtml = _itemImg2
        ? `<img src="${_itemImg2}" style="width:50px;height:50px;border-radius:12px;object-fit:cover;flex-shrink:0">`
        : `<div class="item-icon" style="background:${cat.bg}">${(item.icon && item.icon !== 'undefined') ? item.icon : '🍽️'}</div>`;
      const card = document.createElement('div');
      card.className = 'item-card';
      card.style.animationDelay = (i * 0.04) + 's';
      card.onclick = () => openModal(item);
      card.innerHTML = `${iconHtml}
        <div class="item-info">
          <div class="item-name">${hlName} ${badge}</div>
          <div class="item-desc">${hlDesc}</div>
        </div>
        <div class="item-price">${item.price} &#8380;</div>`;
      wrap.appendChild(card);
    });
    sec.appendChild(wrap);
  });
}

function highlight(text, query) {
  if (!query || !text) return text || '';
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return text;
  return text.slice(0, idx) +
    '<mark style="background:rgba(232,98,42,0.2);color:var(--accent);border-radius:3px;padding:0 2px">' +
    text.slice(idx, idx + query.length) +
    '</mark>' +
    text.slice(idx + query.length);
}

function loadLogo() {
  const url = (STATE.cafe && STATE.cafe.logo) ? STATE.cafe.logo : localStorage.getItem('cafe_logo');
  const wrap = document.getElementById('logo-wrap');
  if (!wrap) return;
  if (url) {
    wrap.innerHTML = '<img src="' + url + '" alt="Logo" style="width:100%;height:100%;object-fit:cover;border-radius:18px">';
  } else {
    wrap.innerHTML = '<div class="header-logo-placeholder"><span>🏪</span></div>';
  }
}

// Flask API-dən data yüklə
fetch('/api/data')
  .then(r => r.json())
  .then(data => {
    STATE = data;
    if (STATE.theme && STATE.theme.vars) applyThemeVars();
    if (STATE.font) applyFontVars();
    if (STATE.layout) applyLayoutVars();
    if (STATE.customCss) applyCustomCss();
    render();
    loadLogo();
    trackMenuOpen();
  })
  .catch(() => { render(); loadLogo(); trackMenuOpen(); });

// Kateqoriya barı — mouse drag scroll
(function() {
  const el = document.querySelector('.cats-wrap');
  if (!el) return;
  let isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', function(e) {
    isDown = true; el.classList.add('dragging');
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', function() { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mouseup', function() { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    e.preventDefault();
    var x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX);
  });
})();
</script>
</body>
</html>
